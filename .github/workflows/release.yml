# À chaque tag v* : récupère les binaires Windows, compile l'installeur Inno
# Setup et publie la release GitHub avec Robloader-Extension-Setup.exe. C'est
# cette release que le bouton « Vérifier les mises à jour » du panneau interroge.
name: release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  installer:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Vérifier que le manifest est à la version du tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}".TrimStart("v")
          $manifest = Get-Content CSXS/manifest.xml -Raw
          if ($manifest -notmatch [regex]::Escape("ExtensionBundleVersion=`"$tag`"")) {
            Write-Error "CSXS/manifest.xml n'est pas en version $tag — mettre à jour ExtensionBundleVersion (x2) avant de tagger."
          }

      - name: Récupérer les binaires Windows (yt-dlp, ffmpeg, deno)
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File bin/fetch-binaries.ps1

      - name: Compiler l'installeur (Inno Setup)
        shell: pwsh
        run: |
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) { choco install innosetup -y --no-progress }
          $tag = "${{ github.ref_name }}".TrimStart("v")
          & $iscc /DAppVersion=$tag installer\robloader.iss

      - name: Publier la release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" installer/Output/Robloader-Extension-Setup.exe `
            --title "Robloader Extension ${{ github.ref_name }}" --generate-notes
