<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Robloader</title>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
  <div class="target-row">
    <span class="dest"><span class="label">Destination :</span> <span id="target">—</span></span>
    <div id="status" class="status paused">Démarrage…</div>
  </div>

  <div class="row url-row">
    <input id="url" type="text" placeholder="Colle l'URL (YouTube, TikTok, Instagram, X, Weibo)…"/>
    <select id="quality" title="Qualité (YouTube)">
      <option value="">Max</option>
      <option value="1440">1440p</option>
      <option value="1080">1080p</option>
      <option value="720">720p</option>
      <option value="480">480p</option>
    </select>
  </div>

  <div class="row">
    <span class="label">Extrait :</span>
    <input id="start" class="tc" type="text" placeholder="00:00"/>
    <span class="dash">→</span>
    <input id="end" class="tc" type="text" placeholder="01:30"/>
    <span class="muted small">(vide = tout)</span>
  </div>

  <div class="row">
    <label class="chk" title="Ré-encode toutes les vidéos, même en 1080p et moins. Évite les artefacts de décodage (« datamoshing ») de Premiere sur certains flux YouTube.">
      <input id="force-transcode" type="checkbox" checked/> Transcodage forcé
    </label>
  </div>

  <div class="controls">
    <button id="download">Télécharger</button>
    <button id="download-audio" title="Télécharge la piste audio seule en WAV">Télécharger audio</button>
    <button id="clear" class="push-right">Nettoyer</button>
  </div>

  <div id="queue"></div>

  <div id="log"></div>

  <div class="footer-row">
    <span class="muted" id="version">v?</span>
    <button id="update" class="small">Vérifier les mises à jour</button>
  </div>

  <script src="js/CSInterface.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
